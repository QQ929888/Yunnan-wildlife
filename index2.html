<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>云南珍稀动植物库</title>
  <link rel="stylesheet" href="sty3.css">
</head>
<body>

<!-- 顶部导航栏 -->
<nav class="navbar">
  <div class="logo">

    <span>云南珍稀动植物库</span>
  </div>
  <ul class="nav-menu">
    <li><a href="index2.html" class="active">首页</a></li>
    <li><a href="plant.html">植物库</a></li>
    <li><a href="animal.html">动物库</a></li>

  </ul>
  <div class="user">
    <!-- 点击触发下拉 -->
    <div class="user-dropdown">
      <span class="user-btn">用户</span>
      <!-- 下拉菜单 -->
      <div class="dropdown-menu">
        <a href="#" class="history-item">收藏</a>
        <a href="index.html" class="logout-item">退出登录</a>
      </div>
    </div>
  </div>

</nav>

<!-- 大图背景区域 -->
<section class="banner">
  <div class="banner-content">
    <div class="banner-title">

      <h1>云南珍稀动植物库</h1>
    </div>
    <p>云南素有"动植物王国"美誉，是中国生物多样性最丰富的省份，拥有全国50％以上的动植物种类，
      其中大量物种为云南特有、珍稀濒危。本库系统收录云南境内珍稀、特有、濒危动植物资源，涵盖物种信息、
      分布区域、保护现状、生态价值等内容，为科研、教育、保护提供权威数据支持，助力生物多样性保护与生态文明建设。</p>
    <div class="search-box">
      <!--            <input type="text" placeholder="搜索">-->
      <!--            <button>搜索</button>-->
    </div>
    <!-- 两个卡片区域 -->
<section class="card-box">
  <!-- 植物库卡片：图片写在HTML里，点击跳转到plant.html -->
  <a href="plant.html" class="card-link">
    <div class="card1">
      <img src="shouye4.jpg" alt="植物库" class="card-img">
      <div class="card-text">
        <h3>植物库</h3>
        <p>收录云南特有珍稀濒危植物，如华盖木、云南红豆杉等，展示独特植物资源与生态价值。</p >
      </div>
    </div>
  </a >

  <!-- 动物库卡片：图片写在HTML里，点击跳转到animal.html -->
  <a href="animal.html" class="card-link">
    <div class="card2">
      <img src="shouye5.jpg" alt="动物库" class="card-img">
      <div class="card-text">
        <h3>动物库</h3>
        <p>汇集滇金丝猴、亚洲象、绿孔雀等珍稀动物，呈现云南野生动物基因宝库的独特魅力。</p >
      </div>
    </div>
  </a >
</section>
  </div>

</section>
<script>
  const userBtn = document.querySelector('.user-btn');
  const dropdown = document.querySelector('.user-dropdown');

  userBtn.addEventListener('click', () => {
    dropdown.classList.toggle('active');
  });

  // 点击页面其他地方关闭
  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target)) {
      dropdown.classList.remove('active');
    }
  });
</script>

</body>
</html>
